name: Next.js CI with Bun

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Khai báo cho GitHub biết dự án này dùng Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Cài đặt thư viện bằng Bun
      - name: Install dependencies
        run: bun install

      # Chạy thử lệnh build để kiểm tra xem code có lỗi gì không
      - name: Build Next.js
        run: bun run build
